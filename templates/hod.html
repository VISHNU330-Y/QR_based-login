<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HOD Dashboard — Gate Pass System</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="app-container" id="app">
        <div id="navbar"></div>

        <!-- Stats -->
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card cyan" style="animation-delay:0.1s">
                <div class="stat-value" id="statPending">0</div>
                <div class="stat-label">Pending</div>
            </div>
            <div class="stat-card green" style="animation-delay:0.2s">
                <div class="stat-value" id="statApproved">0</div>
                <div class="stat-label">Approved Today</div>
            </div>
            <div class="stat-card purple" style="animation-delay:0.3s">
                <div class="stat-value" id="statTotal">0</div>
                <div class="stat-label">Total Requests</div>
            </div>
        </div>

        <!-- Filter -->
        <div class="filter-tabs">
            <button class="filter-tab active" onclick="loadRequests('all', this)">All</button>
            <button class="filter-tab" onclick="loadRequests('pending', this)">⏳ Pending</button>
            <button class="filter-tab" onclick="loadRequests('approved', this)">✅ Approved</button>
            <button class="filter-tab" onclick="loadRequests('rejected', this)">❌ Rejected</button>
        </div>

        <!-- Requests List -->
        <div class="request-list" id="requestsList"></div>
    </div>

    <script src="/static/js/app.js"></script>
    <script>
        const user = requireAuth('hod');
        if (user) init();

        async function init() {
            document.getElementById('navbar').innerHTML = renderNavbar(user, '👨‍🏫 HOD');
            loadStats();
            loadRequests('all');
        }

        async function loadStats() {
            try {
                const data = await apiFetch('/api/hod/stats');
                document.getElementById('statPending').textContent = data.pending;
                document.getElementById('statApproved').textContent = data.approved_today;
                document.getElementById('statTotal').textContent = data.total;
            } catch (err) {}
        }

        async function loadRequests(status, btn) {
            if (btn) {
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
            }

            const list = document.getElementById('requestsList');
            list.innerHTML = '<div class="spinner"></div>';

            try {
                const data = await apiFetch(`/api/hod/requests?status=${status}`);
                const requests = data.requests || [];

                if (requests.length === 0) {
                    list.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-icon">📋</div>
                            <h3>No requests found</h3>
                            <p>No ${status === 'all' ? '' : status} requests from your department</p>
                        </div>`;
                    return;
                }

                list.innerHTML = requests.map((r, i) => {
                    const initials = r.student_name ? r.student_name.split(' ').map(n => n[0]).join('') : '?';
                    return `
                    <div class="request-card" style="animation-delay:${i * 0.08}s">
                        <div class="request-card-header">
                            <div class="request-student">
                                <div class="request-student-avatar">${initials}</div>
                                <div class="request-student-info">
                                    <div class="student-name">${r.student_name}</div>
                                    <div class="student-meta">${r.roll_no} • ${r.department} • Year ${r.year || '-'} • ${r.hostel_block || '-'}</div>
                                </div>
                            </div>
                            ${getStatusBadge(r.hod_status)}
                        </div>
                        <div class="request-details">
                            <div class="request-detail">
                                <span class="detail-label">📅 Date</span>
                                <span class="detail-value">${formatDate(r.date)}</span>
                            </div>
                            <div class="request-detail">
                                <span class="detail-label">⏰ Exit</span>
                                <span class="detail-value">${formatTime(r.exit_time)}</span>
                            </div>
                            <div class="request-detail">
                                <span class="detail-label">⏳ Return</span>
                                <span class="detail-value">${formatTime(r.return_time)}</span>
                            </div>
                            <div class="request-detail">
                                <span class="detail-label">📍 Destination</span>
                                <span class="detail-value">${r.destination}</span>
                            </div>
                            <div class="request-detail" style="grid-column: span 2">
                                <span class="detail-label">📄 Reason</span>
                                <span class="detail-value">${r.reason}</span>
                            </div>
                        </div>
                        ${r.hod_status === 'pending' ? `
                        <div class="request-actions">
                            <input class="remarks-input" id="remarks-${r.id}" placeholder="Add remarks (optional)">
                            <button class="btn btn-success btn-sm" onclick="approveRequest(${r.id})">✅ Approve</button>
                            <button class="btn btn-danger btn-sm" onclick="rejectRequest(${r.id})">❌ Reject</button>
                        </div>` : `
                        ${r.hod_remarks ? `<div style="margin-top:12px;font-size:0.85rem;color:var(--text-secondary)">
                            <strong>Remarks:</strong> ${r.hod_remarks}</div>` : ''}
                        `}
                    </div>`;
                }).join('');

            } catch (err) {
                list.innerHTML = '<div class="empty-state"><h3>Failed to load</h3></div>';
            }
        }

        async function approveRequest(passId) {
            const remarks = document.getElementById(`remarks-${passId}`)?.value || '';
            try {
                await apiFetch(`/api/hod/approve/${passId}`, {
                    method: 'POST',
                    body: JSON.stringify({ remarks })
                });
                showToast('Request approved!', 'success');
                loadRequests('all');
                loadStats();
            } catch (err) {}
        }

        async function rejectRequest(passId) {
            const remarks = document.getElementById(`remarks-${passId}`)?.value || '';
            if (!confirm('Reject this request?')) return;
            try {
                await apiFetch(`/api/hod/reject/${passId}`, {
                    method: 'POST',
                    body: JSON.stringify({ remarks: remarks || 'Rejected by HOD' })
                });
                showToast('Request rejected', 'info');
                loadRequests('all');
                loadStats();
            } catch (err) {}
        }
    </script>
</body>
</html>
